<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWMS Login</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Prompt:wght@300;400;500;600&family=Sarabun:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #f4f6fb;
            --card: #ffffff;
            --text: #1e2d42;
            --muted: #6b7a90;
            --primary: #1b3a6b;
            --blue: #2e6db4;
            --radius: 14px;
            --error: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 60px;
            background: var(--primary);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-family: 'Prompt', sans-serif;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .title {
            font-family: 'Kanit', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        .sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .roles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .role {
            padding: 12px;
            text-align: center;
            border-radius: var(--radius);
            background: #f1f4f9;
            cursor: pointer;
            font-size: 13px;
            transition: .2s;
            font-family: 'Prompt', sans-serif;
        }

        .role:hover {
            background: #eaf2ff;
            transform: translateY(-2px);
        }

        .role.active {
            background: #eaf2ff;
            border: 1px solid var(--blue);
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
        }

        input {
            width: 100%;
            height: 44px;
            margin-top: 5px;
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 0 12px;
            font-family: 'Sarabun', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(46, 109, 180, 0.15);
        }

        button {
            width: 100%;
            height: 46px;
            margin-top: 10px;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            transition: .2s;
        }

        button:hover {
            background: var(--blue);
        }

        button.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .error {
            font-size: 13px;
            color: var(--error);
            margin-bottom: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <span>มอดูล 5 การแจ้งเตือนและควบคุมความเสี่ยงเชิงปฏิบัติการ</span>
    </div>

    <div class="main">
        <div class="card">
            <div class="title">ระบบบริหารภาระงานอัจฉริยะ</div>
            <div class="sub">มอดูล 5 - การแจ้งเตือนและควบคุมความเสี่ยง</div>

            <div class="roles">
                <div class="role" onclick="setRole(this)">บุคลากรหน่วยงาน</div>
                <div class="role" onclick="setRole(this)">ผู้บริหารหน่วยงาน</div>
            </div>

            <div class="error" id="error">กรอกข้อมูลไม่ครบ</div>

            <div class="field">
                <label>ชื่อผู้ใช้</label>
                <input type="text" id="user" placeholder="staff หรือ admin">
            </div>

            <div class="field">
                <label>รหัสผ่าน</label>
                <input type="password" id="pass" placeholder="1234">
            </div>

            <button id="btn" onclick="login()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="footer">SWMS © 2026</div>

    <script>
        let role = null;

        function setRole(el) {
            document.querySelectorAll(".role").forEach(r => r.classList.remove("active"));
            el.classList.add("active");
            role = el.innerText;
        }

        function login() {
            const u = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();
            const err = document.getElementById("error");
            const btn = document.getElementById("btn");

            err.classList.remove("show");

            if (!role || !u || !p) {
                err.innerText = "กรอกข้อมูลไม่ครบ";
                err.classList.add("show");
                return;
            }

            const users = [
                { u: "staff", p: "1234", role: "บุคลากรหน่วยงาน" },
                { u: "admin", p: "1234", role: "ผู้บริหารหน่วยงาน" }
            ];

            btn.classList.add("loading");
            btn.innerText = "กำลังเข้าสู่ระบบ...";

            setTimeout(() => {
                const user = users.find(x => x.u === u && x.p === p && x.role === role);

                if (!user) {
                    err.innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
                    err.classList.add("show");
                    btn.classList.remove("loading");
                    btn.innerText = "เข้าสู่ระบบ";
                    return;
                }

                localStorage.setItem("user", JSON.stringify(user));

                window.location.href =
                    role === "บุคลากรหน่วยงาน"
                        ? "staff-dashboard.html"
                        : "admin-dashboard.html";
            }, 800);
        }

        document.getElementById("user").addEventListener("keydown", e => {
            if (e.key === "Enter") login();
        });

        document.getElementById("pass").addEventListener("keydown", e => {
            if (e.key === "Enter") login();
        });
    </script>
</body>

</html>
