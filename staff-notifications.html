<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWMS - การแจ้งเตือน</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Prompt:wght@300;400;500;600&family=Sarabun:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6fb;
            --card: #ffffff;
            --text: #1e2d42;
            --muted: #6b7a90;
            --primary: #1b3a6b;
            --secondary: #2e6db4;
            --red: #e74c3c;
            --yellow: #f39c12;
            --green: #2ecc71;
            --radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #eaeef5;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-family: 'Kanit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .menu div {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .menu div:hover,
        .menu div.active {
            background: #eef4ff;
            color: var(--secondary);
            font-weight: 600;
        }

        .user {
            margin-top: auto;
            font-size: 12px;
            color: var(--muted);
            padding: 10px;
            border-top: 1px solid #eee;
        }

        .logout {
            margin-top: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-family: 'Prompt', sans-serif;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 30px;
            overflow: auto;
        }

        h1 {
            font-family: 'Kanit', sans-serif;
            font-size: 26px;
        }

        .sub {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* NOTIFICATIONS LIST */
        .noti-list {
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .noti-item {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            border: 1px solid #eee;
        }

        .noti-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .icon-red {
            background: #7b0c00;
            color: var(--red);
        }

        .icon-yellow {
            background: #ef9a12;
            color: var(--yellow);
        }

        .icon-blue {
            background: #0062ff;
            color: var(--secondary);
        }

        .noti-content h4 {
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .noti-content p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .noti-time {
            font-size: 11px;
            color: #aab7c4;
            margin-top: 8px;
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="sidebar">
            <div class="logo">บุคลากรหน่วยงาน</div>
            <div class="menu">
                <div onclick="window.location.href='staff-dashboard.html'">แดชบอร์ดบุคลากร</div>
                <div onclick="window.location.href='staff-tasks.html'">งานของฉัน</div>
                <div class="active">การแจ้งเตือน</div>
            </div>
            <div class="user" id="userDisplay"></div>
            <button class="logout" onclick="logout()">ออกจากระบบ</button>
        </div>

        <div class="main">
            <h1>ศูนย์การแจ้งเตือน (Notifications)</h1>
            <div class="sub">แจ้งเตือนสถานะภาระงานและความเสี่ยงเชิงปฏิบัติการล่าสุด</div>

            <div class="noti-list" id="notiList">
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user") || "null");
        if (!user || user.role !== "บุคลากรหน่วยงาน") window.location.href = "login.html";
        document.getElementById("userDisplay").innerText = user.u + " | ผู้ปฏิบัติงาน";

        let settings = JSON.parse(localStorage.getItem("swms_settings")) || { high: 0, med: 2 };
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        function renderNoti() {
            let html = "";
            let hasAlerts = false;

            tasks.forEach(t => {
                // ข้ามงานที่เสร็จแล้ว
                if (t.status === "เสร็จสิ้น") return;

                // 1. ตรวจสอบการโอนย้ายงานใหม่
                if (t.status === "โอนย้ายงาน/มอบหมายใหม่") {
                    hasAlerts = true;
                    html += `
                    <div class="noti-item">
                        <div class="noti-icon icon-blue"></div>
                        <div class="noti-content">
                            <h4>คุณได้รับมอบหมายงานใหม่</h4>
                            <p>ผู้บริหารหน่วยงานได้กระจายภาระงาน <b>"${t.taskName}"</b> มาให้คุณรับผิดชอบ (SLA: ${t.due} วัน)</p>
                            <div class="noti-time">สถานะ: กรุณากดรับทราบที่หน้าแดชบอร์ด</div>
                        </div>
                    </div>`;
                }

                // 2. ตรวจสอบความเสี่ยงสูง (เกินกำหนด/ถึงกำหนด)
                if (t.due <= settings.high) {
                    hasAlerts = true;
                    html += `
                    <div class="noti-item">
                        <div class="noti-icon icon-red"></div>
                        <div class="noti-content">
                            <h4>วิกฤต: ภาระงานเกินกำหนดการ (Overdue)</h4>
                            <p>ภารกิจ <b>"${t.taskName}"</b> ถึงกำหนดส่งหรือเกินระยะเวลาที่กำหนดแล้ว กรุณาเร่งดำเนินการทันทีเพื่อป้องกันความเสี่ยง</p>
                            <div class="noti-time">SLA คงเหลือ: ${t.due} วัน</div>
                        </div>
                    </div>`;
                }
                // 3. ตรวจสอบความเสี่ยงปานกลาง (ใกล้ถึงกำหนด)
                else if (t.due <= settings.med) {
                    hasAlerts = true;
                    html += `
                    <div class="noti-item">
                        <div class="noti-icon icon-yellow"></div>
                        <div class="noti-content">
                            <h4>เฝ้าระวัง: ภาระงานใกล้ถึงกำหนด</h4>
                            <p>ภารกิจ <b>"${t.taskName}"</b> ใกล้ครบกำหนดตามระยะเวลามาตรฐาน (SLA) แล้ว</p>
                            <div class="noti-time">SLA คงเหลือ: ${t.due} วัน</div>
                        </div>
                    </div>`;
                }
            });

            if (!hasAlerts) {
                html = `<div style="text-align: center; padding: 40px; color: var(--muted);">ไม่มีการแจ้งเตือนความเสี่ยงใหม่ในขณะนี้ 🎉</div>`;
            }

            document.getElementById("notiList").innerHTML = html;
        }

        function logout() { localStorage.removeItem("user"); window.location.href = "login.html"; }

        renderNoti();
    </script>
</body>

</html>
